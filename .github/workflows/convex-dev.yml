name: Convex Deploy

on:
  push:
    branches:
      - main

jobs:
  convex-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun + dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::error::Missing CONVEX_DEPLOY_KEY secret"
            echo "Please configure it in GitHub:"
            echo "1. Go to your repository Settings → Secrets and variables → Actions"
            echo "2. Click 'New repository secret'"
            echo "3. Name: CONVEX_DEPLOY_KEY"
            echo "4. Value: Copy the full deploy key from https://dashboard.convex.dev → Settings → Authentication"
            echo ""
            echo "The deploy key should be a long base64-encoded string starting with 'eyJ'"
            exit 1
          fi
          bunx convex deploy --yes
