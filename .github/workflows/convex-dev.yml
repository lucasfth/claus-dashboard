name: Convex Sync

on:
  push:
    branches:
      - main

jobs:
  convex-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun + dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Convex dev (one-shot)
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::error::Missing CONVEX_DEPLOY_KEY"
            echo "Add it to your repository:"
            echo "1. Go to https://dashboard.convex.dev"
            echo "2. Find your deployment and get your deploy key"
            echo "3. Go to GitHub repo Settings → Secrets and variables → Actions"
            echo "4. Create a new secret named 'CONVEX_DEPLOY_KEY' with the deploy key value"
            exit 1
          fi
          bunx convex dev --once
